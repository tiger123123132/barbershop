<html lang="ar" dir="rtl" id="htmlRoot">
<head>

<title>تسجيل الدخول — BarberStor</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--p:#C9A84C;--p2:#E8C97A;--dark:#080808;--dark2:#0f0f0f;--dark3:#171717;--dark4:#222;--dark5:#2c2c2c;--text:#f0ede8;--muted:#666;--green:#2ecc71;--red:#e74c3c}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow:hidden}
body::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:54px 54px;pointer-events:none}
body::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(201,168,76,.1),transparent 65%);pointer-events:none}
.box{background:var(--dark3);border:1px solid var(--dark5);border-radius:24px;padding:2.5rem 2rem;width:100%;max-width:420px;position:relative;z-index:1;animation:fu .4s ease}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{text-align:center;margin-bottom:2rem;cursor:pointer}
.logo-wrap img{height:60px;width:auto;object-fit:contain;filter:invert(1)}
.page-title{font-size:1.5rem;font-weight:900;color:var(--p);margin-bottom:.3rem}
.page-sub{color:var(--muted);font-size:.85rem;margin-bottom:1.8rem}
.tab-bar{display:flex;background:var(--dark2);border-radius:12px;padding:.3rem;margin-bottom:1.3rem;gap:.3rem}
.tab-btn{flex:1;padding:.55rem;border:none;border-radius:9px;font-family:'Cairo',sans-serif;font-weight:700;font-size:.83rem;cursor:pointer;transition:.2s;background:transparent;color:var(--muted)}
.tab-active{background:var(--dark3);color:var(--p);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.tab-inactive{color:var(--muted)}
.fg{margin-bottom:1rem}
.fg label{display:block;color:var(--muted);font-size:.78rem;margin-bottom:.35rem}
.fi{width:100%;background:var(--dark2);border:1.5px solid var(--dark5);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:'Cairo',sans-serif;font-size:.88rem;transition:.2s;direction:inherit}
.fi:focus{outline:none;border-color:var(--p);box-shadow:0 0 10px rgba(201,168,76,.1)}
.btn{padding:.7rem 1.3rem;border-radius:12px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:.9rem;border:none;transition:.2s;width:100%;margin-bottom:.7rem}
.btn-gold{background:linear-gradient(135deg,var(--p),var(--p2));color:#000}
.btn-gold:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(201,168,76,.4)}
.btn-ghost{background:transparent;border:1.5px solid var(--dark5);color:var(--muted)}
.btn-ghost:hover{border-color:var(--muted);color:var(--text)}
.google-btn{display:flex;align-items:center;justify-content:center;gap:.8rem;background:var(--dark2);border:1.5px solid var(--dark5);border-radius:12px;padding:.75rem;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:.88rem;color:var(--text);transition:.2s;width:100%;margin-bottom:.7rem}
.google-btn:hover{border-color:rgba(201,168,76,.4);background:var(--dark4)}
.divider{text-align:center;color:var(--muted);font-size:.78rem;margin:.3rem 0 .8rem;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--dark5)}
.divider::before{right:0}.divider::after{left:0}
.err-msg{color:var(--red);font-size:.8rem;margin-bottom:.5rem;min-height:1.1rem}
.ok-msg{color:var(--green);font-size:.8rem;margin-bottom:.5rem;min-height:1.1rem}
.switch-link{text-align:center;margin-top:.5rem;font-size:.82rem;color:var(--muted)}
.switch-link a{color:var(--p);cursor:pointer;font-weight:700;text-decoration:none}
.coming-box{text-align:center;padding:2rem 1rem}
.remember-wrap{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.remember-wrap input{width:16px;height:16px;accent-color:var(--p);cursor:pointer}
.remember-wrap label{font-size:.82rem;color:var(--muted);cursor:pointer}
#loader{position:fixed;inset:0;background:rgba(8,8,8,.85);z-index:9998;display:none;align-items:center;justify-content:center}
#loader.on{display:flex}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--dark5);border-top-color:var(--p);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark3);border:1px solid var(--p);color:var(--text);padding:.8rem 1.8rem;border-radius:12px;font-size:.88rem;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>

<div id="loader"><div class="spin"></div></div>
<div id="toast"></div>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut,
         createUserWithEmailAndPassword, signInWithEmailAndPassword,
         GoogleAuthProvider, signInWithPopup,
         setPersistence, browserLocalPersistence, browserSessionPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app  = initializeApp({apiKey:"AIzaSyAHSfjlmSyI8a5rJlR4Uep9Lc-HrHTEQAE",authDomain:"barber-stor.firebaseapp.com",projectId:"barber-stor",storageBucket:"barber-stor.firebasestorage.app",messagingSenderId:"219780488634",appId:"1:219780488634:web:650eb88e5b452e9cb2d183"});
const auth = getAuth(app);
const db   = getFirestore(app);

const $      = id => document.getElementById(id);
const loader = on => $('loader').style.display = on ? 'flex' : 'none';
const toast  = msg => { const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800); };

// ── Show section ──
window.showSection = sec => {
  $('secLogin').style.display    = sec==='login'    ? 'block' : 'none';
  $('secRegister').style.display = sec==='register' ? 'block' : 'none';
  $('tabLogin').className    = 'tab-btn ' + (sec==='login'    ? 'tab-active' : 'tab-inactive');
  $('tabRegister').className = 'tab-btn ' + (sec==='register' ? 'tab-active' : 'tab-inactive');
};

// ── Check section from URL ──
if(new URLSearchParams(location.search).get('tab') === 'register') showSection('register');

// ── Redirect result (mobile Google) ──
async function handleGoogleUser(user) {
  const snap = await getDoc(doc(db,'barbers',user.uid));
  if(!snap.exists()) {
    await setDoc(doc(db,'barbers',user.uid), {
      name: user.displayName||'حلاق',
      username: 'user'+Date.now().toString().slice(-6),
      email: user.email||'', phone:'',
      status:'inactive', plan:'pro', createdAt: new Date().toISOString(),
      theme:{primaryColor:'#C9A84C'},
      settings:{shopName:user.displayName||'', sub:'', lang:'ar'},
      services:[{id:1,name:'قصة شعر',price:50,dur:30,ico:'💈'},{id:2,name:'حلاقة دقن',price:40,dur:20,ico:'🪒'}],
      coupons:[]
    });
  }
  window.location.href = 'dashboard.html';
}

// ── Auth State ──
onAuthStateChanged(auth, user => {
  if(user) window.location.href = 'dashboard.html';
});

// ── Login ──
window.doLogin = async () => {
  const email = $('loginEmail').value.trim();
  const pass  = $('loginPass').value;
  const err   = $('loginErr');
  err.textContent = '';
  if(!email||!pass) { err.textContent='يرجى ملء جميع الحقول'; return; }
  loader(true);
  try {
    await setPersistence(auth, $('rememberMe').checked ? browserLocalPersistence : browserSessionPersistence);
    await signInWithEmailAndPassword(auth, email, pass);
    window.location.href = 'dashboard.html';
  } catch(e) {
    err.textContent = firebaseErr(e.code);
    loader(false);
  }
};

// ── Register ──
window.doRegister = async () => {
  const name     = $('regName').value.trim();
  const username = $('regUsername').value.trim().toLowerCase();
  const email    = $('regEmail').value.trim();
  const pass     = $('regPass').value;
  const err      = $('regErr');
  const ok       = $('regOk');
  err.textContent = ''; ok.textContent = '';
  if(!name||!username||!email||!pass) { err.textContent='يرجى ملء جميع الحقول'; return; }
  if(username.length<3) { err.textContent='اسم المستخدم ٣ أحرف على الأقل'; return; }
  if(pass.length<6)     { err.textContent='كلمة المرور ٦ أحرف على الأقل'; return; }
  loader(true);
  try {
    const q = query(collection(db,'barbers'), where('username','==',username));
    if(!(await getDocs(q)).empty) { err.textContent='اسم المستخدم محجوز'; loader(false); return; }
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,'barbers',cred.user.uid), {
      name, username, email, phone:'',
      status:'inactive', plan:'pro', createdAt: new Date().toISOString(),
      theme:{primaryColor:'#C9A84C'},
      settings:{shopName:name, sub:'', lang:'ar'},
      services:[{id:1,name:'قصة شعر',price:50,dur:30,ico:'💈'},{id:2,name:'حلاقة دقن',price:40,dur:20,ico:'🪒'}],
      coupons:[]
    });
    ok.textContent = '✓ تم إنشاء الحساب!';
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
  } catch(e) {
    err.textContent = firebaseErr(e.code);
    loader(false);
  }
};

// ── Google ──
window.doGoogleLogin = async () => {
  loader(true);
  try {
    await setPersistence(auth, browserLocalPersistence);
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'});
    const result = await signInWithPopup(auth, provider);
    await handleGoogleUser(result.user);
  } catch(e) {
    loader(false);
    if(e.code === 'auth/popup-blocked') {
      toast('⚠️ فعّل النوافذ المنبثقة من إعدادات Safari ثم حاول مرة ثانية');
    } else if(e.code !== 'auth/popup-closed-by-user') {
      toast('فشل الدخول بـ Google: ' + e.code);
    }
  }
};

function firebaseErr(code) {
  const m = {'auth/email-already-in-use':'البريد مستخدم مسبقاً','auth/invalid-email':'بريد غير صالح','auth/weak-password':'كلمة المرور ضعيفة','auth/wrong-password':'كلمة المرور خاطئة','auth/invalid-credential':'بيانات خاطئة'};
  return m[code] || 'حدث خطأ، حاول مرة ثانية';
}
</script>
