<!DOCTYPE html>

<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#C9A84C;--p-light:rgba(201,168,76,.15);--p-glow:rgba(201,168,76,.25);
  --dark:#080808;--dark2:#111;--dark3:#1a1a1a;--dark4:#252525;--dark5:#303030;
  --text:#f0ede8;--muted:#777;--green:#2ecc71;--red:#e74c3c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem;background:rgba(8,8,8,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.05)}
.tb-logo{font-size:.85rem;font-weight:900;color:var(–p);opacity:.7}
.lang-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(–muted);padding:.3rem .8rem;border-radius:8px;cursor:pointer;font-family:‘Cairo’,sans-serif;font-size:.75rem;transition:.2s}
.lang-btn:hover{color:var(–text);border-color:var(–p)}

/* HERO */
#heroSec{padding:5.5rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden;min-height:220px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gridbg{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:48px 48px}
.hero-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(ellipse,var(–p-glow),transparent 70%);pointer-events:none}
#shopName{font-size:clamp(1.8rem,7vw,3rem);font-weight:900;line-height:1.1;margin-bottom:.4rem;position:relative;color:var(–p)}
#shopSub{color:var(–muted);font-size:.88rem;position:relative;letter-spacing:.5px}
.shop-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:50px;padding:.25rem .85rem;font-size:.72rem;color:var(–p);margin-top:.6rem;position:relative}
.dot-live{width:5px;height:5px;border-radius:50%;background:var(–green);animation:dpulse 2s infinite}
@keyframes dpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* BOOKING WRAP */
#bookWrap{max-width:580px;margin:0 auto;padding:.8rem 1.2rem 7rem}

/* PROGRESS */
.progress{display:flex;align-items:center;justify-content:center;gap:.4rem;margin:0 0 1.8rem}
.pdot{height:5px;border-radius:3px;background:var(–dark5);transition:all .4s;width:5px}
.pdot.active{width:30px;background:var(–p)}
.pdot.done{width:5px;background:rgba(201,168,76,.4)}

/* STEPS */
.step{display:none;animation:fu .3s ease}
.step.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:1.05rem;font-weight:800;text-align:center;margin-bottom:1.3rem;color:var(–text)}

/* SERVICE CARDS */
.svc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.7rem;margin-bottom:1.5rem}
.svc-card{background:var(–dark3);border:2px solid var(–dark5);border-radius:16px;padding:1.2rem .8rem;cursor:pointer;text-align:center;transition:all .2s;position:relative;overflow:hidden;user-select:none}
.svc-card:active{transform:scale(.97)}
.svc-card.sel{border-color:var(–p);background:var(–p-light);box-shadow:0 0 24px var(–p-glow)}
.svc-card .ico{font-size:1.9rem;display:block;margin-bottom:.5rem}
.svc-card .sname{font-weight:700;font-size:.88rem;margin-bottom:.25rem;color:var(–text)}
.svc-card .sprice{font-size:.95rem;font-weight:900;color:var(–p)}
.svc-card .sdur{color:var(–muted);font-size:.7rem;margin-top:.15rem}
.check-mark{position:absolute;top:.5rem;left:.5rem;width:20px;height:20px;border-radius:50%;background:var(–p);color:#000;font-size:.7rem;display:none;align-items:center;justify-content:center;font-weight:900}
.svc-card.sel .check-mark{display:flex}

/* DATE PICKER */
.date-scroll{display:flex;gap:.5rem;overflow-x:auto;padding:.2rem .1rem 1rem;margin-bottom:.8rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-btn{background:var(–dark3);border:2px solid var(–dark5);border-radius:12px;padding:.7rem .6rem;text-align:center;cursor:pointer;transition:.2s;font-family:‘Cairo’,sans-serif;color:var(–text);min-width:62px;flex-shrink:0;scroll-snap-align:start;user-select:none}
.date-btn:active{transform:scale(.95)}
.date-btn.sel{border-color:var(–p);background:var(–p-light);color:var(–p)}
.date-btn.today::after{content:‘اليوم’;display:block;font-size:.55rem;color:var(–p);margin-top:.1rem}
.date-btn .day-name{font-size:.62rem;color:var(–muted);display:block;margin-bottom:.2rem}
.date-btn.sel .day-name{color:var(–p)}
.date-btn .day-num{font-size:1rem;font-weight:800;display:block}

/* SLOTS */
.slots-label{color:var(–muted);font-size:.75rem;margin-bottom:.55rem;display:block;margin-top:.5rem}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;margin-bottom:1.4rem}
.slot{background:var(–dark3);border:1.5px solid var(–dark5);border-radius:9px;padding:.55rem .15rem;text-align:center;cursor:pointer;font-family:‘Cairo’,sans-serif;color:var(–text);font-size:.78rem;transition:.2s;user-select:none}
.slot:active:not(.taken){transform:scale(.95)}
.slot.sel{background:var(–p);border-color:var(–p);color:#000;font-weight:800}
.slot.taken{opacity:.28;cursor:not-allowed;text-decoration:line-through;background:var(–dark2)}
.no-slots{text-align:center;color:var(–muted);padding:1.5rem;font-size:.85rem}

/* FORM */
.fg{margin-bottom:.9rem}
.fg label{display:block;color:var(–muted);font-size:.75rem;margin-bottom:.3rem;font-weight:600}
.fi{width:100%;background:var(–dark3);border:1.5px solid var(–dark5);border-radius:11px;padding:.75rem 1rem;color:var(–text);font-family:‘Cairo’,sans-serif;font-size:.9rem;transition:.2s;direction:inherit;-webkit-appearance:none}
.fi:focus{outline:none;border-color:var(–p);box-shadow:0 0 0 3px var(–p-light)}
select.fi option{background:var(–dark3)}

/* COUPON */
.cpnrow{display:flex;gap:.5rem}
.cpnrow .fi{flex:1}
.btn-apply{background:transparent;border:1.5px solid var(–p);color:var(–p);padding:0 1rem;border-radius:11px;cursor:pointer;font-family:‘Cairo’,sans-serif;font-weight:700;font-size:.82rem;transition:.2s;white-space:nowrap;min-width:70px}
.btn-apply:active{transform:scale(.95)}
.cpnmsg{font-size:.75rem;min-height:1.1rem;margin-top:.35rem}
.cpnmsg.ok{color:var(–green)}.cpnmsg.err{color:var(–red)}

/* SUMMARY */
.sumbox{background:var(–dark3);border:1px solid var(–dark5);border-radius:14px;padding:1.1rem;margin-bottom:1.2rem;overflow:hidden}
.srow{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid var(–dark5);font-size:.85rem}
.srow:last-child{border-bottom:none;padding-top:.7rem;margin-top:.2rem}
.srow .slbl{color:var(–muted)}
.srow.total .slbl{color:var(–text);font-weight:800;font-size:.95rem}
.srow.total .sval{color:var(–p);font-weight:900;font-size:1.1rem}
.srow.disc .sval{color:var(–green)}

/* NAV BUTTONS */
.fnav{display:flex;gap:.6rem;position:fixed;bottom:0;left:0;right:0;padding:.9rem 1.2rem 1.2rem;background:linear-gradient(transparent,var(–dark) 30%);z-index:100}
.btn-next{flex:1;border:none;padding:.9rem 1.5rem;font-family:‘Cairo’,sans-serif;font-weight:800;font-size:.92rem;border-radius:13px;cursor:pointer;transition:.2s;color:#000;background:linear-gradient(135deg,var(–p),#e8c97a);user-select:none}
.btn-next:active{transform:scale(.97)}
.btn-next:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-back{background:var(–dark3);border:1.5px solid var(–dark5);color:var(–muted);padding:.9rem 1.1rem;font-family:‘Cairo’,sans-serif;font-size:.9rem;border-radius:13px;cursor:pointer;transition:.2s;min-width:70px;text-align:center}
.btn-back:active{transform:scale(.97)}

/* SUCCESS */
#successSec{display:none;text-align:center;padding:6rem 2rem 4rem;animation:fu .5s ease}
#successSec.on{display:block}
.s-circle{width:90px;height:90px;border-radius:50%;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;font-size:2.5rem;animation:pop .5s ease;background:rgba(46,204,113,.1);border:2px solid rgba(46,204,113,.3)}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
#successSec h2{font-size:1.5rem;font-weight:900;margin-bottom:.6rem;color:var(–green)}
#successSec .det{color:var(–muted);font-size:.85rem;line-height:1.8;margin-bottom:.4rem}
.new-book-btn{margin-top:2rem;padding:.85rem 2.5rem;border:none;border-radius:50px;font-family:‘Cairo’,sans-serif;font-weight:800;font-size:.92rem;cursor:pointer;color:#000;background:linear-gradient(135deg,var(–p),#e8c97a)}

/* NOT FOUND */
#notFound{display:none;text-align:center;padding:8rem 2rem}
#notFound.on{display:block}
#notFound .ico{font-size:4rem;margin-bottom:1rem;display:block}
#notFound h2{color:var(–muted);margin-bottom:.5rem;font-size:1.2rem}
#notFound p{color:var(–muted);font-size:.85rem}

/* LOADER */
#loader{position:fixed;inset:0;background:var(–dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
#loader.off{display:none}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid var(–dark5);border-top-color:var(–p);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:var(–muted);font-size:.82rem;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* TOAST */
#toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(30px);background:var(–dark3);border:1px solid var(–p);color:var(–text);padding:.7rem 1.5rem;border-radius:12px;font-size:.85rem;transition:.3s;z-index:9999;white-space:nowrap;opacity:0;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(min-width:600px){.svc-grid{grid-template-columns:repeat(3,1fr)}.slots{grid-template-columns:repeat(5,1fr)}}
</style>

</head>
<body>

<div id="loader"><div class="spin"></div><div class="load-txt" id="loadTxt">جاري التحميل...</div></div>

<!-- TOP BAR -->

<div class="topbar">
  <div class="tb-logo">BarberStor ✂️</div>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<!-- HERO -->

<section id="heroSec" style="display:none">
  <div class="gridbg"></div>
  <div class="hero-glow"></div>
  <div id="shopName">...</div>
  <div id="shopSub"></div>
  <div class="shop-badge"><div class="dot-live"></div><span data-ar="متاح الآن للحجز" data-en="Available for booking">متاح الآن للحجز</span></div>
</section>

<!-- BOOKING -->

<div id="bookWrap" style="display:none">
  <div class="progress">
    <div class="pdot active" id="d1"></div>
    <div class="pdot" id="d2"></div>
    <div class="pdot" id="d3"></div>
    <div class="pdot" id="d4"></div>
  </div>

  <!-- Step 1: Service -->

  <div class="step active" id="s1">
    <div class="sec-title" data-ar="اختر الخدمة 💈" data-en="Choose Service 💈">اختر الخدمة 💈</div>
    <div class="svc-grid" id="svcGrid"></div>
    <div class="fnav">
      <button class="btn-next" id="n1" onclick="goStep(2)" disabled data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 2: Date & Time -->

  <div class="step" id="s2">
    <div class="sec-title" data-ar="اختر التاريخ والوقت 📅" data-en="Choose Date & Time 📅">اختر التاريخ والوقت 📅</div>
    <div class="date-scroll" id="dateScroll"></div>
    <div id="slotsSection" style="display:none">
      <span class="slots-label" data-ar="الأوقات المتاحة" data-en="Available Times">الأوقات المتاحة</span>
      <div class="slots" id="slotsEl"></div>
    </div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(1)" data-ar="رجوع" data-en="Back">رجوع</button>
      <button class="btn-next" id="n2" onclick="goStep(3)" disabled data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 3: Info & Coupon -->

  <div class="step" id="s3">
    <div class="sec-title" data-ar="بياناتك 👤" data-en="Your Info 👤">بياناتك 👤</div>
    <div class="fg"><label data-ar="الاسم الكامل" data-en="Full Name">الاسم الكامل</label><input type="text" class="fi" id="nameIn" placeholder="محمد أحمد"></div>
    <div class="fg"><label data-ar="رقم الجوال" data-en="Phone Number">رقم الجوال</label><input type="tel" class="fi" id="phoneIn" placeholder="05xxxxxxxx" inputmode="numeric"></div>
    <div class="fg">
      <label data-ar="كوبون خصم (اختياري)" data-en="Discount Coupon (optional)">كوبون خصم (اختياري)</label>
      <div class="cpnrow">
        <input type="text" class="fi" id="cpnIn" placeholder="SAVE20" style="text-transform:uppercase">
        <button class="btn-apply" onclick="applyCoupon()" data-ar="تطبيق" data-en="Apply">تطبيق</button>
      </div>
      <div class="cpnmsg" id="cpnMsg"></div>
    </div>
    <div style="height:4.5rem"></div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(2)" data-ar="رجوع" data-en="Back">رجوع</button>
      <button class="btn-next" onclick="goStep(4)" data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 4: Confirm -->

  <div class="step" id="s4">
    <div class="sec-title" data-ar="تأكيد الحجز ✅" data-en="Confirm Booking ✅">تأكيد الحجز ✅</div>
    <div class="sumbox" id="sumEl"></div>
    <div style="height:4.5rem"></div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(3)" data-ar="رجوع" data-en="Back">رجوع</button>
      <button class="btn-next" id="confirmBtn" onclick="confirmBooking()" data-ar="✓ تأكيد الحجز" data-en="✓ Confirm Booking">✓ تأكيد الحجز</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->

<div id="successSec">
  <div class="s-circle">✅</div>
  <h2 data-ar="تم الحجز بنجاح!" data-en="Booking Confirmed!">تم الحجز بنجاح!</h2>
  <div class="det" id="sucName"></div>
  <div class="det" id="sucService"></div>
  <div class="det" id="sucDateTime"></div>
  <div class="det" id="sucTotal"></div>
  <p style="margin-top:.8rem;font-size:.78rem;color:var(--muted)" data-ar="📞 سيتم التواصل معك للتأكيد" data-en="📞 We will contact you to confirm">📞 سيتم التواصل معك للتأكيد</p>
  <button class="new-book-btn" onclick="location.reload()" data-ar="حجز جديد ✦" data-en="New Booking ✦">حجز جديد ✦</button>
</div>

<!-- NOT FOUND -->

<div id="notFound">
  <span class="ico">🔍</span>
  <h2 data-ar="الصفحة غير موجودة" data-en="Page Not Found">الصفحة غير موجودة</h2>
  <p data-ar="تأكد من صحة الرابط أو تواصل مع الحلاق" data-en="Check the link or contact your barber">تأكد من صحة الرابط أو تواصل مع الحلاق</p>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyAHSfjlmSyI8a5rJlR4Uep9Lc-HrHTEQAE",
  authDomain:"barber-stor.firebaseapp.com",
  projectId:"barber-stor",
  storageBucket:"barber-stor.firebasestorage.app",
  messagingSenderId:"219780488634",
  appId:"1:219780488634:web:650eb88e5b452e9cb2d183"
});
const db = getFirestore(app);

let barberData=null, barberId=null;
let B = {service:null, date:null, time:null, coupon:null, discAmt:0};

const DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const DAYS_EN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

// Generate time slots based on service duration
function genSlots(dur){
  const slots=[]; let h=9,m=0;
  while(h<21||(h===21&&m===0)){
    slots.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
    m+=dur||30; if(m>=60){h+=Math.floor(m/60);m=m%60;}
  }
  return slots;
}

// ── INIT ──
async function init(){
  const params   = new URLSearchParams(location.search);
  const username = params.get('u');
  if(!username){ showNotFound(); return; }

  try {
    const q    = query(collection(db,'barbers'), where('username','==',username));
    const snap = await getDocs(q);
    if(snap.empty){ showNotFound(); return; }

    const barberDoc = snap.docs[0];
    barberId   = barberDoc.id;
    barberData = barberDoc.data();
    window._bd = barberData;

    if(barberData.status !== 'active'){ showNotFound(); return; }

    // Apply theme from Firebase
    const color = barberData.theme?.primaryColor || '#C9A84C';
    applyTheme(color);
    applyShopInfo();
    buildDatePicker();
    renderServices();

    document.getElementById('heroSec').style.display = 'flex';
    document.getElementById('bookWrap').style.display = 'block';
  } catch(e){
    console.error(e);
    showNotFound();
  }
  document.getElementById('loader').classList.add('off');
}

function applyTheme(color){
  document.documentElement.style.setProperty('--p', color);
  // Convert hex to rgba for glow effects
  const r=parseInt(color.slice(1,3),16), g=parseInt(color.slice(3,5),16), b=parseInt(color.slice(5,7),16);
  document.documentElement.style.setProperty('--p-light', `rgba(${r},${g},${b},0.12)`);
  document.documentElement.style.setProperty('--p-glow',  `rgba(${r},${g},${b},0.22)`);
  // Hero glow
  document.querySelector('.hero-glow').style.background = `radial-gradient(ellipse,rgba(${r},${g},${b},.2),transparent 70%)`;
  // Update next buttons
  document.querySelectorAll('.btn-next').forEach(btn=>{
    btn.style.background = `linear-gradient(135deg,${color},${lightenHex(color,40)})`;
  });
  document.querySelector('.new-book-btn').style.background = `linear-gradient(135deg,${color},${lightenHex(color,40)})`;
  document.querySelector('.btn-apply').style.borderColor = color;
  document.querySelector('.btn-apply').style.color = color;
}

function lightenHex(hex, amt){
  let r=parseInt(hex.slice(1,3),16)+amt, g=parseInt(hex.slice(3,5),16)+amt, b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function applyShopInfo(){
  const isAr = window.isAr !== false;
  const d = barberData.settings;
  const name = isAr ? (d?.shopName||barberData.name||'') : (d?.shopNameEn||d?.shopName||barberData.name||'');
  const sub  = isAr ? (d?.sub||'') : (d?.subEn||d?.sub||'');
  document.getElementById('shopName').textContent = name;
  document.getElementById('shopSub').textContent  = sub;
  document.title = name + ' — حجز موعد';
}

// ── DATE PICKER ──
function buildDatePicker(){
  const wrap = document.getElementById('dateScroll');
  wrap.innerHTML = '';
  const today = new Date();
  for(let i=0;i<14;i++){
    const d = new Date(today); d.setDate(today.getDate()+i);
    const yyyy = d.getFullYear(), mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    const dateStr = `${yyyy}-${mm}-${dd}`;
    const btn = document.createElement('div');
    btn.className = 'date-btn' + (i===0?' today':'');
    btn.dataset.date = dateStr;
    const isAr = window.isAr !== false;
    btn.innerHTML = `<span class="day-name">${isAr?DAYS_AR[d.getDay()]:DAYS_EN[d.getDay()]}</span><span class="day-num">${dd}</span>`;
    btn.onclick = () => pickDate(dateStr, btn);
    wrap.appendChild(btn);
  }
}

window.pickDate = async (dateStr, el) => {
  B.date = dateStr; B.time = null;
  document.getElementById('n2').disabled = true;
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  await loadSlots(dateStr);
};

async function loadSlots(dateStr){
  document.getElementById('slotsSection').style.display = 'none';
  document.getElementById('loadTxt').textContent = 'جاري تحميل الأوقات...';

  // Get booked slots for this date
  const q    = query(collection(db,'bookings'), where('barberId','==',barberId), where('date','==',dateStr));
  const snap = await getDocs(q);
  const taken = snap.docs.map(d=>d.data().time);

  const dur  = B.service?.dur || 30;
  const slots = genSlots(dur);

  const slotsEl = document.getElementById('slotsEl');
  slotsEl.innerHTML = '';

  if(!slots.length){
    slotsEl.innerHTML = `<div class="no-slots" data-ar="لا توجد أوقات متاحة" data-en="No available times">لا توجد أوقات متاحة</div>`;
  } else {
    slots.forEach(t => {
      const isTaken = taken.includes(t);
      const div = document.createElement('div');
      div.className = 'slot' + (isTaken?' taken':'');
      div.textContent = t;
      if(!isTaken) div.onclick = () => pickSlot(t, div);
      slotsEl.appendChild(div);
    });
  }
  document.getElementById('slotsSection').style.display = 'block';
}

window.pickSlot = (t, el) => {
  B.time = t;
  document.querySelectorAll('.slot').forEach(s=>{
    s.classList.remove('sel');
    s.style.background=''; s.style.color=''; s.style.borderColor='';
  });
  el.classList.add('sel');
  document.getElementById('n2').disabled = false;
};

// ── SERVICES ──
function renderServices(){
  const svcs = barberData.services||[];
  const isAr = window.isAr !== false;
  const grid = document.getElementById('svcGrid');
  grid.innerHTML = '';
  svcs.forEach(s=>{
    const div = document.createElement('div');
    div.className = 'svc-card';
    div.innerHTML = `
      <div class="check-mark">✓</div>
      <span class="ico">${s.ico||'✂️'}</span>
      <div class="sname">${isAr?s.name:(s.nameEn||s.name)}</div>
      <div class="sprice">${s.price} ${isAr?'ريال':'SAR'}</div>
      <div class="sdur">${s.dur||30} ${isAr?'دقيقة':'min'}</div>`;
    div.onclick = () => {
      B.service = s;
      document.querySelectorAll('.svc-card').forEach(c=>c.classList.remove('sel'));
      div.classList.add('sel');
      document.getElementById('n1').disabled = false;
    };
    grid.appendChild(div);
  });
}

// ── COUPON ──
window.applyCoupon = () => {
  const code = document.getElementById('cpnIn').value.trim().toUpperCase();
  const msg  = document.getElementById('cpnMsg');
  const cpn  = (barberData.coupons||[]).find(c=>c.code.toUpperCase()===code);
  const isAr = window.isAr !== false;
  if(!cpn){
    msg.className='cpnmsg err';
    msg.textContent = isAr ? '❌ الكود غير صحيح' : '❌ Invalid code';
    B.coupon=null; B.discAmt=0; return;
  }
  B.coupon = cpn.code;
  const p = B.service?.price||0;
  B.discAmt = cpn.type==='percent' ? Math.round(p*cpn.val/100) : cpn.val;
  msg.className='cpnmsg ok';
  msg.textContent = isAr ? `✅ خصم ${B.discAmt} ريال` : `✅ Discount ${B.discAmt} SAR`;
};

// ── STEPS ──
window.goStep = n => {
  if(n===3){
    if(!B.date||!B.time){ toast(window.isAr!==false?'⚠️ اختر التاريخ والوقت':'⚠️ Choose date and time'); return; }
  }
  if(n===4){
    const name  = document.getElementById('nameIn').value.trim();
    const phone = document.getElementById('phoneIn').value.trim();
    if(!name||!phone){ toast(window.isAr!==false?'⚠️ أدخل الاسم ورقم الجوال':'⚠️ Enter name and phone'); return; }
    buildSummary(name,phone);
  }
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  // Update dots
  for(let i=1;i<=4;i++){
    const d=document.getElementById('d'+i);
    if(i<n){ d.className='pdot done'; }
    else if(i===n){ d.className='pdot active'; }
    else{ d.className='pdot'; }
  }
  window.scrollTo({top:0,behavior:'smooth'});
};

function buildSummary(name,phone){
  const p     = B.service.price;
  const disc  = B.discAmt||0;
  const total = Math.max(0,p-disc);
  const isAr  = window.isAr !== false;
  const svcName = isAr ? B.service.name : (B.service.nameEn||B.service.name);

  let html = `
    <div class="srow"><span class="slbl">${isAr?'الخدمة':'Service'}</span><span>${svcName}</span></div>
    <div class="srow"><span class="slbl">${isAr?'التاريخ':'Date'}</span><span>${B.date}</span></div>
    <div class="srow"><span class="slbl">${isAr?'الوقت':'Time'}</span><span>${B.time}</span></div>
    <div class="srow"><span class="slbl">${isAr?'الاسم':'Name'}</span><span>${name}</span></div>
    <div class="srow"><span class="slbl">${isAr?'الجوال':'Phone'}</span><span>${phone}</span></div>
    <div class="srow"><span class="slbl">${isAr?'السعر':'Price'}</span><span>${p} ${isAr?'ريال':'SAR'}</span></div>`;
  if(disc>0) html+=`<div class="srow disc"><span class="slbl">${isAr?'خصم':'Discount'} (${B.coupon})</span><span class="sval">− ${disc} ${isAr?'ريال':'SAR'}</span></div>`;
  html+=`<div class="srow total"><span class="slbl">${isAr?'الإجمالي':'Total'}</span><span class="sval">${total} ${isAr?'ريال':'SAR'}</span></div>`;
  document.getElementById('sumEl').innerHTML = html;
}

// ── CONFIRM ──
window.confirmBooking = async () => {
  const name  = document.getElementById('nameIn').value.trim();
  const phone = document.getElementById('phoneIn').value.trim();
  const p     = B.service.price;
  const disc  = B.discAmt||0;
  const total = Math.max(0,p-disc);
  const isAr  = window.isAr !== false;

  // ── DOUBLE BOOKING CHECK ──
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('loadTxt').textContent = isAr?'جاري التأكيد...':'Confirming...';
  document.getElementById('loader').classList.remove('off');

  try {
    const checkQ = query(collection(db,'bookings'),
      where('barberId','==',barberId),
      where('date','==',B.date),
      where('time','==',B.time));
    const checkSnap = await getDocs(checkQ);

    if(!checkSnap.empty){
      document.getElementById('loader').classList.add('off');
      document.getElementById('confirmBtn').disabled = false;
      toast(isAr?'⚠️ هذا الوقت محجوز! اختر وقتاً آخر':'⚠️ This time is taken! Choose another');
      goStep(2);
      return;
    }

    // Save booking to Firebase
    await addDoc(collection(db,'bookings'),{
      barberId,
      name, phone,
      service:    B.service.name,
      serviceEn:  B.service.nameEn||'',
      date:       B.date,
      time:       B.time,
      price:      p,
      discount:   disc,
      total:      total,
      coupon:     B.coupon||'',
      walkin:     false,
      ts:         new Date().toISOString(),
    });

    // Show success
    document.getElementById('bookWrap').style.display  = 'none';
    document.getElementById('heroSec').style.display   = 'none';
    document.getElementById('successSec').style.display = 'block';
    document.getElementById('sucName').textContent    = `👤 ${name} · ${phone}`;
    document.getElementById('sucService').textContent = `💈 ${isAr?B.service.name:(B.service.nameEn||B.service.name)}`;
    document.getElementById('sucDateTime').textContent = `📅 ${B.date} ${isAr?'الساعة':'at'} ${B.time}`;
    document.getElementById('sucTotal').textContent   = `💰 ${total} ${isAr?'ريال':'SAR'}`;

  } catch(e){
    console.error(e);
    toast(isAr?'❌ حدث خطأ، حاول مرة ثانية':'❌ Error, please try again');
    document.getElementById('confirmBtn').disabled = false;
  }
  document.getElementById('loader').classList.add('off');
};

function showNotFound(){
  document.getElementById('loader').classList.add('off');
  document.getElementById('notFound').style.display = 'block';
}

init();
</script>

<script>
window.isAr = true;

window.toggleLang = () => {
  window.isAr = !window.isAr;
  const html = document.getElementById('htmlRoot');
  html.lang = window.isAr?'ar':'en';
  html.dir  = window.isAr?'rtl':'ltr';
  document.getElementById('langBtn').textContent = window.isAr?'EN':'ع';
  document.querySelectorAll('[data-ar]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='SELECT') return;
    el.textContent = window.isAr ? el.dataset.ar : el.dataset.en;
  });
  if(window._bd) {
    const d = window._bd?.settings;
    document.getElementById('shopName').textContent = window.isAr?(d?.shopName||window._bd?.name||''):(d?.shopNameEn||d?.shopName||window._bd?.name||'');
    document.getElementById('shopSub').textContent  = window.isAr?(d?.sub||''):(d?.subEn||d?.sub||'');
  }
};

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}
window.toast=toast;
</script>
