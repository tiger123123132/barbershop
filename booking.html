<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حجز موعد</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --p:#C9A84C;--p2:#E8C97A;
  --dark:#080808;--dark2:#111;--dark3:#1a1a1a;--dark4:#252525;--dark5:#2e2e2e;
  --text:#f0ede8;--muted:#666;--green:#2ecc71;--red:#e74c3c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh}

/* HERO */
#heroSec{min-height:40vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3rem 1.5rem 2rem;position:relative;overflow:hidden}
#heroSec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(var(--pr),var(--pg),var(--pb),.15),transparent 65%)}
.gridbg{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(201,168,76,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,.03) 1px,transparent 1px);background-size:52px 52px}
#shopName{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;line-height:1.1;margin-bottom:.4rem;position:relative}
#shopSub{color:var(--muted);font-size:.9rem;letter-spacing:2px;position:relative}
.lang-btn{position:fixed;top:1rem;left:1rem;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:.4rem .85rem;border-radius:8px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.78rem;z-index:100;backdrop-filter:blur(8px);transition:.2s}
.lang-btn:hover{color:var(--text)}
.powered{position:fixed;bottom:1rem;right:1rem;font-size:.72rem;color:var(--muted);text-decoration:none;opacity:.5}
.powered:hover{opacity:1}

/* BOOKING WRAP */
#bookWrap{max-width:660px;margin:0 auto;padding:1.5rem 1.5rem 6rem}

/* PROGRESS */
.progress{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-bottom:2.5rem}
.pdot{height:7px;border-radius:4px;background:var(--dark5);width:7px;transition:all .35s}
.pdot.active{width:26px}
.pdot.done{opacity:.5}

/* STEPS */
.step{display:none;animation:fu .3s ease}
.step.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.sec-title{font-size:1.25rem;font-weight:800;text-align:center;margin-bottom:1.6rem}

/* SERVICES */
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem;margin-bottom:1.6rem}
.svc-card{background:var(--dark3);border:2px solid var(--dark5);border-radius:16px;padding:1.2rem 1rem;cursor:pointer;text-align:center;transition:all .25s;position:relative;overflow:hidden}
.svc-card::after{content:'';position:absolute;inset:0;opacity:0;transition:.25s;background:linear-gradient(135deg,rgba(var(--pr),var(--pg),var(--pb),.1),transparent)}
.svc-card:hover::after,.svc-card.sel::after{opacity:1}
.svc-card.sel{border-color:var(--p);box-shadow:0 0 20px rgba(var(--pr),var(--pg),var(--pb),.2)}
.svc-card .ico{font-size:2rem;display:block;margin-bottom:.5rem}
.svc-card .sname{font-weight:700;font-size:.88rem}
.svc-card .sprice{font-size:.85rem;font-weight:700;margin-top:.2rem}
.svc-card .sdur{color:var(--muted);font-size:.73rem;margin-top:.1rem}

/* SLOTS */
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:.5rem;margin-bottom:1.4rem}
.slot{background:var(--dark3);border:1.5px solid var(--dark5);border-radius:9px;padding:.5rem;text-align:center;cursor:pointer;font-family:'Cairo',sans-serif;color:var(--text);font-size:.84rem;transition:.2s}
.slot:hover{border-color:var(--p)}
.slot.sel{font-weight:800;border-color:var(--p);color:#000}
.slot.taken{opacity:.3;cursor:not-allowed;text-decoration:line-through;pointer-events:none}

/* FORM */
.fg{margin-bottom:1.1rem}
.fg label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:.35rem}
.fi{width:100%;background:var(--dark3);border:1.5px solid var(--dark5);border-radius:10px;padding:.75rem 1rem;color:var(--text);font-family:'Cairo',sans-serif;font-size:.9rem;transition:.2s;direction:inherit}
.fi:focus{outline:none;box-shadow:0 0 10px rgba(var(--pr),var(--pg),var(--pb),.15)}
select.fi option{background:var(--dark3)}

/* COUPON */
.cpnrow{display:flex;gap:.55rem;margin-bottom:.4rem}
.cpnrow .fi{flex:1}
.btn-apply{background:transparent;border:1.5px solid var(--p);color:var(--p);padding:0 1rem;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700;font-size:.85rem;transition:.2s;white-space:nowrap}
.btn-apply:hover{background:rgba(var(--pr),var(--pg),var(--pb),.1)}
.cpnmsg{font-size:.78rem;min-height:1rem;margin-bottom:.7rem}
.cpnmsg.ok{color:var(--green)}.cpnmsg.err{color:var(--red)}

/* SUMMARY */
.sumbox{background:var(--dark3);border:1px solid var(--dark5);border-radius:14px;padding:1.2rem;margin-bottom:1.3rem}
.srow{display:flex;justify-content:space-between;padding:.4rem 0;border-bottom:1px solid var(--dark5);font-size:.88rem}
.srow:last-child{border-bottom:none}
.srow.total{font-weight:800;font-size:1rem}
.srow.disc{color:var(--green)}

/* NAV */
.fnav{display:flex;gap:.7rem;margin-top:1.3rem}
.btn-next{flex:1;border:none;padding:.85rem 1.5rem;font-family:'Cairo',sans-serif;font-weight:800;font-size:.92rem;border-radius:11px;cursor:pointer;transition:.25s;color:#000}
.btn-next:hover{transform:translateY(-2px)}
.btn-next:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-back{background:transparent;border:1.5px solid var(--dark5);color:var(--muted);padding:.85rem 1.2rem;font-family:'Cairo',sans-serif;font-size:.92rem;border-radius:11px;cursor:pointer;transition:.2s}
.btn-back:hover{border-color:var(--muted);color:var(--text)}

/* SUCCESS */
#successSec{display:none;text-align:center;padding:5rem 2rem;animation:fu .5s ease}
#successSec.on{display:block}
.sico{font-size:5rem;display:block;margin-bottom:1.2rem;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
#successSec h2{font-size:1.8rem;font-weight:900;margin-bottom:.8rem}
#successSec p{color:var(--muted);margin-bottom:.4rem}

/* NOT FOUND */
#notFound{display:none;text-align:center;padding:6rem 2rem}
#notFound.on{display:block}

/* LOADER */
#loader{position:fixed;inset:0;background:rgba(8,8,8,.9);z-index:9999;display:flex;align-items:center;justify-content:center}
#loader.off{display:none}
.spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--dark5);border-top-color:var(--p);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark3);border:1px solid var(--p);color:var(--text);padding:.8rem 1.8rem;border-radius:12px;font-size:.88rem;transition:.3s;z-index:9999;white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:500px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div></div>

<button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
<a class="powered" href="index.html">Powered by BarberStor</a>

<!-- HERO -->
<section id="heroSec">
  <div class="gridbg"></div>
  <div id="shopName">...</div>
  <div id="shopSub"></div>
</section>

<!-- BOOKING -->
<div id="bookWrap" style="display:none">
  <div class="progress">
    <div class="pdot active" id="d1"></div>
    <div class="pdot" id="d2"></div>
    <div class="pdot" id="d3"></div>
    <div class="pdot" id="d4"></div>
  </div>

  <!-- Step 1: Service -->
  <div class="step active" id="s1">
    <div class="sec-title" data-ar="اختر الخدمة" data-en="Choose Service">اختر الخدمة</div>
    <div class="svc-grid" id="svcGrid"></div>
    <div class="fnav">
      <button class="btn-next" id="n1" onclick="goStep(2)" disabled data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 2: Date & Time -->
  <div class="step" id="s2">
    <div class="sec-title" data-ar="اختر الوقت" data-en="Choose Time">اختر الوقت</div>
    <div class="fg"><label data-ar="التاريخ" data-en="Date">التاريخ</label><input type="date" class="fi" id="dateIn" onchange="loadSlots()"></div>
    <div id="slotsWrap" style="display:none">
      <label style="color:var(--muted);font-size:.8rem;display:block;margin-bottom:.55rem" data-ar="الأوقات المتاحة" data-en="Available Times">الأوقات المتاحة</label>
      <div class="slots" id="slotsEl"></div>
    </div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(1)" data-ar="→ رجوع" data-en="← Back">→ رجوع</button>
      <button class="btn-next" id="n2" onclick="goStep(3)" disabled data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 3: Info -->
  <div class="step" id="s3">
    <div class="sec-title" data-ar="بياناتك" data-en="Your Info">بياناتك</div>
    <div class="fg"><label data-ar="الاسم" data-en="Name">الاسم</label><input type="text" class="fi" id="nameIn" placeholder="محمد أحمد"></div>
    <div class="fg"><label data-ar="رقم الجوال" data-en="Phone">رقم الجوال</label><input type="tel" class="fi" id="phoneIn" placeholder="05xxxxxxxx"></div>
    <div class="fg">
      <label data-ar="كوبون خصم (اختياري)" data-en="Discount Coupon (optional)">كوبون خصم (اختياري)</label>
      <div class="cpnrow">
        <input type="text" class="fi" id="cpnIn" placeholder="SAVE20">
        <button class="btn-apply" onclick="applyCoupon()" data-ar="تطبيق" data-en="Apply">تطبيق</button>
      </div>
      <div class="cpnmsg" id="cpnMsg"></div>
    </div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(2)" data-ar="→ رجوع" data-en="← Back">→ رجوع</button>
      <button class="btn-next" onclick="goStep(4)" data-ar="التالي ←" data-en="Next →">التالي ←</button>
    </div>
  </div>

  <!-- Step 4: Confirm -->
  <div class="step" id="s4">
    <div class="sec-title" data-ar="تأكيد الحجز" data-en="Confirm Booking">تأكيد الحجز</div>
    <div class="sumbox" id="sumEl"></div>
    <div class="fnav">
      <button class="btn-back" onclick="goStep(3)" data-ar="→ رجوع" data-en="← Back">→ رجوع</button>
      <button class="btn-next" onclick="confirmBooking()" data-ar="✓ تأكيد الحجز" data-en="✓ Confirm Booking">✓ تأكيد الحجز</button>
    </div>
  </div>
</div>

<!-- SUCCESS -->
<div id="successSec">
  <span class="sico">✅</span>
  <h2 data-ar="تم الحجز بنجاح!" data-en="Booking Confirmed!">تم الحجز بنجاح!</h2>
  <p id="sucDetail"></p>
  <p style="margin-top:.8rem;font-size:.8rem;color:var(--muted)" data-ar="سيتم التواصل معك للتأكيد" data-en="We will contact you to confirm">سيتم التواصل معك للتأكيد</p>
  <button onclick="resetBooking()" style="margin-top:2rem;padding:.85rem 2.5rem;border:none;border-radius:50px;font-family:'Cairo',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;color:#000" class="btn-next" data-ar="حجز جديد ✦" data-en="New Booking ✦">حجز جديد ✦</button>
</div>

<!-- NOT FOUND -->
<div id="notFound">
  <div style="font-size:4rem;margin-bottom:1rem">🔍</div>
  <h2 style="color:var(--muted);margin-bottom:.5rem" data-ar="الصفحة غير موجودة" data-en="Page Not Found">الصفحة غير موجودة</h2>
  <p style="color:var(--muted);font-size:.88rem" data-ar="تأكد من صحة الرابط" data-en="Check the link and try again">تأكد من صحة الرابط</p>
</div>

<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHSfjlmSyI8a5rJlR4Uep9Lc-HrHTEQAE",
  authDomain: "barber-stor.firebaseapp.com",
  projectId: "barber-stor",
  storageBucket: "barber-stor.firebasestorage.app",
  messagingSenderId: "219780488634",
  appId: "1:219780488634:web:650eb88e5b452e9cb2d183"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let barberData = null;
let barberId   = null;
const B = { service:null, date:null, time:null, coupon:null, discPct:0, discAmt:0 };

const SLOTS = ['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30',
               '13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30',
               '17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'];

// ── LOAD BARBER ──
async function init(){
  const params   = new URLSearchParams(location.search);
  const username = params.get('u');
  if(!username){ showNotFound(); return; }

  const q    = query(collection(db,'barbers'), where('username','==',username));
  const snap = await getDocs(q);

  if(snap.empty || snap.docs[0].data().status !== 'active'){ showNotFound(); return; }

  barberId   = snap.docs[0].id;
  barberData = snap.docs[0].data();

  applyTheme(barberData.theme?.primaryColor || '#C9A84C');
  applyLang();

  // Today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateIn').min   = today;
  document.getElementById('dateIn').value = today;

  renderServices();
  document.getElementById('bookWrap').style.display = 'block';
  document.getElementById('loader').classList.add('off');
}

function showNotFound(){
  document.getElementById('loader').classList.add('off');
  document.getElementById('heroSec').style.display = 'none';
  document.getElementById('notFound').classList.add('on');
}

function applyTheme(color){
  document.documentElement.style.setProperty('--p', color);
  // Extract RGB for rgba usage
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  document.documentElement.style.setProperty('--pr', r);
  document.documentElement.style.setProperty('--pg', g);
  document.documentElement.style.setProperty('--pb', b);
  // Apply to dynamic elements
  document.querySelectorAll('.btn-next').forEach(b=>b.style.background=`linear-gradient(135deg,${color},${lighten(color)})`);
  document.getElementById('shopName').style.color = color;
}

function lighten(hex){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+40); g=Math.min(255,g+40); b=Math.min(255,b+40);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function applyLang(){
  const isAr = window.isAr !== false;
  const d = barberData.settings;
  const name = isAr ? (d?.shopName||barberData.name) : (d?.shopNameEn||d?.shopName||barberData.name);
  const sub  = isAr ? (d?.sub||'') : (d?.subEn||d?.sub||'');
  document.getElementById('shopName').textContent = name;
  document.getElementById('shopSub').textContent  = sub;
  document.title = name + ' — BarberStor';
}

// ── SERVICES ──
function renderServices(){
  const svcs = barberData.services || [];
  const isAr = window.isAr !== false;
  document.getElementById('svcGrid').innerHTML = svcs.map(s=>`
    <div class="svc-card" id="sc${s.id}" onclick="pickSvc('${s.id}')">
      <span class="ico">${s.ico||'✂️'}</span>
      <div class="sname">${isAr?s.name:(s.nameEn||s.name)}</div>
      <div class="sprice" style="color:var(--p)">${s.price} ${isAr?'ريال':'SAR'}</div>
      <div class="sdur">${s.dur||30} ${isAr?'دقيقة':'min'}</div>
    </div>`).join('');
}

window.pickSvc = id => {
  B.service = barberData.services.find(s=>String(s.id)===String(id));
  document.querySelectorAll('.svc-card').forEach(c=>c.classList.remove('sel'));
  document.getElementById('sc'+id).classList.add('sel');
  document.getElementById('n1').disabled = false;
};

// ── SLOTS ──
window.loadSlots = async () => {
  B.date = document.getElementById('dateIn').value;
  B.time = null;
  document.getElementById('n2').disabled = true;
  document.getElementById('slotsWrap').style.display = 'block';

  // Get taken slots from Firebase
  const q    = query(collection(db,'bookings'), where('barberId','==',barberId), where('date','==',B.date));
  const snap = await getDocs(q);
  const taken = snap.docs.map(d=>d.data().time);

  document.getElementById('slotsEl').innerHTML = SLOTS.map(t=>{
    const busy = taken.includes(t);
    return `<div class="slot${busy?' taken':''}" id="sl${t.replace(':','-')}"
      ${busy?'':'onclick="pickSlot(\''+t+'\')"'}>${t}</div>`;
  }).join('');
};

window.pickSlot = t => {
  B.time = t;
  document.querySelectorAll('.slot').forEach(s=>s.classList.remove('sel'));
  const el = document.getElementById('sl'+t.replace(':','-'));
  if(el){ el.classList.add('sel'); el.style.background='var(--p)'; }
  document.getElementById('n2').disabled = false;
};

// ── COUPON ──
window.applyCoupon = () => {
  const code = document.getElementById('cpnIn').value.trim().toUpperCase();
  const msg  = document.getElementById('cpnMsg');
  const cpn  = (barberData.coupons||[]).find(c=>c.code.toUpperCase()===code);
  if(!cpn){ msg.className='cpnmsg err'; msg.textContent='❌ '+(window.isAr!==false?'الكود غير صحيح':'Invalid code'); B.coupon=null;B.discPct=0;B.discAmt=0; return; }
  B.coupon = cpn.code;
  if(cpn.type==='percent'){ B.discPct=cpn.val;B.discAmt=0; msg.className='cpnmsg ok'; msg.textContent=`✅ خصم ${cpn.val}%`; }
  else { B.discAmt=cpn.val;B.discPct=0; msg.className='cpnmsg ok'; msg.textContent=`✅ خصم ${cpn.val} ${window.isAr!==false?'ريال':'SAR'}`; }
};

// ── STEPS ──
window.goStep = n => {
  if(n===4){
    const name  = document.getElementById('nameIn').value.trim();
    const phone = document.getElementById('phoneIn').value.trim();
    if(!name||!phone){ toast(window.isAr!==false?'⚠️ أدخل الاسم والجوال':'⚠️ Enter name and phone'); return; }
    buildSummary(name,phone);
  }
  document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  for(let i=1;i<=4;i++){
    const d = document.getElementById('d'+i);
    d.className='pdot'+(i<n?' done':i===n?' active':'');
    if(i===n) d.style.background='var(--p)';
    else if(i<n) d.style.background='rgba(var(--pr),var(--pg),var(--pb),.4)';
    else d.style.background='';
  }
  window.scrollTo({top:0,behavior:'smooth'});
};

function buildSummary(name,phone){
  const p    = B.service.price;
  const disc = B.discPct>0 ? Math.round(p*B.discPct/100) : B.discAmt;
  const total= Math.max(0,p-disc);
  const isAr = window.isAr!==false;
  let h = `
    <div class="srow"><span>${isAr?'الخدمة':'Service'}</span><span>${isAr?B.service.name:(B.service.nameEn||B.service.name)}</span></div>
    <div class="srow"><span>${isAr?'التاريخ':'Date'}</span><span>${B.date}</span></div>
    <div class="srow"><span>${isAr?'الوقت':'Time'}</span><span>${B.time}</span></div>
    <div class="srow"><span>${isAr?'الاسم':'Name'}</span><span>${name}</span></div>
    <div class="srow"><span>${isAr?'الجوال':'Phone'}</span><span>${phone}</span></div>
    <div class="srow"><span>${isAr?'السعر':'Price'}</span><span>${p} ${isAr?'ريال':'SAR'}</span></div>`;
  if(disc>0) h+=`<div class="srow disc"><span>${isAr?'الخصم':'Discount'} (${B.coupon})</span><span>- ${disc} ${isAr?'ريال':'SAR'}</span></div>`;
  h+=`<div class="srow total" style="color:var(--p)"><span>${isAr?'الإجمالي':'Total'}</span><span>${total} ${isAr?'ريال':'SAR'}</span></div>`;
  document.getElementById('sumEl').innerHTML = h;
}

// ── CONFIRM ──
window.confirmBooking = async () => {
  const name  = document.getElementById('nameIn').value.trim();
  const phone = document.getElementById('phoneIn').value.trim();
  const p     = B.service.price;
  const disc  = B.discPct>0 ? Math.round(p*B.discPct/100) : B.discAmt;
  const total = Math.max(0,p-disc);

  document.getElementById('loader').classList.remove('off');
  try {
    await addDoc(collection(db,'bookings'),{
      barberId, name, phone,
      service: B.service.name,
      serviceEn: B.service.nameEn||'',
      date: B.date, time: B.time,
      price:p, discount:disc, total,
      coupon: B.coupon||'',
      ts: new Date().toISOString(),
    });
    document.getElementById('bookWrap').style.display = 'none';
    document.getElementById('heroSec').style.display  = 'none';
    document.getElementById('successSec').classList.add('on');
    const isAr = window.isAr!==false;
    document.getElementById('sucDetail').textContent =
      `${name} | ${isAr?B.service.name:(B.service.nameEn||B.service.name)} | ${B.date} ${isAr?'الساعة':'at'} ${B.time} | ${total} ${isAr?'ريال':'SAR'}`;
  } catch(e){ toast('❌ '+(window.isAr!==false?'حدث خطأ، حاول مرة ثانية':'An error occurred, try again')); }
  document.getElementById('loader').classList.add('off');
};

window.resetBooking = () => location.reload();

// INIT
init();
</script>

<script>
window.isAr = true;

window.toggleLang = () => {
  window.isAr = !window.isAr;
  const html = document.getElementById('htmlRoot');
  html.lang = window.isAr?'ar':'en';
  html.dir  = window.isAr?'rtl':'ltr';
  document.getElementById('langBtn').textContent = window.isAr?'EN':'ع';
  document.querySelectorAll('[data-ar]').forEach(el=>{
    if(el.tagName==='INPUT'||el.tagName==='SELECT') return;
    el.textContent = window.isAr ? el.dataset.ar : el.dataset.en;
  });
  if(window.barberData) {
    // Re-apply name/sub
    const d = window.barberData?.settings;
    document.getElementById('shopName').textContent = window.isAr?(d?.shopName||''):(d?.shopNameEn||d?.shopName||'');
    document.getElementById('shopSub').textContent  = window.isAr?(d?.sub||''):(d?.subEn||d?.sub||'');
  }
};

// Make barberData accessible globally for lang toggle
Object.defineProperty(window,'barberData',{get:()=>window._bd,set:v=>{window._bd=v;}});

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}
window.toast=toast;
</script>
</body>
</html>
